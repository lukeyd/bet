# Canonical formatting, enforced in CI (`cargo fmt --all --check`). Stable-only keys
# so `cargo fmt` never errors on the pinned stable toolchain.
edition = "2024"
max_width = 100
newline_style = "Unix"
use_field_init_shorthand = true
use_try_shorthand = true

# Nightly-only niceties, enable if/when CI adds a nightly fmt pass:
# imports_granularity = "Crate"
# group_imports = "StdExternalCrate"
