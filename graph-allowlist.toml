# The ONLY permitted internal (workspace-to-workspace) dependency edges.
# `cargo xtask graph-check` fails if any crate depends on a workspace crate not
# listed for it, or if a crate has no entry here at all. Adding an edge is a
# deliberate, reviewable act — edit this file in the same PR that adds the dep.
#
# Mirrors the allowed dependency graph in bootstrap-plan.md §3. Notably forbidden:
# `backend -> frontend` (backend may only know the IR). The driver owns runtime *selection* but
# does NOT depend on `rt-stub`/`runtime`: both export the same `#[no_mangle] bet_*` symbols, so
# linking them into the `bet` binary collides (a hard duplicate-symbol error on rust-lld). The
# driver names the archive as a string and links it into the *compiled program* at build time;
# the staticlibs are built as their own workspace members.
[allow]
midir      = []
rt-abi     = []
rt-stub    = ["rt-abi"]
# gg-backend is the native `gg` platform layer (window/audio/input); it only knows the ABI.
gg-backend = ["rt-abi"]
# runtime + interp both drive the platform layer through gg-backend (the `gg-desktop` feature).
runtime    = ["rt-abi", "gg-backend"]
frontend   = ["midir"]
backend    = ["midir", "rt-abi"]
interp     = ["frontend", "rt-abi", "gg-backend"]
fmt        = ["frontend"]
lsp        = ["frontend"]
driver     = ["frontend", "backend", "interp", "fmt"]
# playground: the browser WASM shim (wasm-bindgen over parse + run_to_string). Only the two
# library edges are internal; `wasm-bindgen` is external and not tracked here.
playground = ["frontend", "interp"]
xtask      = []
