name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Host-independent checks run once (cheap): formatting, lints, dependency-graph, deny.
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: install pinned toolchain
        run: rustup show          # reads rust-toolchain.toml (channel + rustfmt + clippy)
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        # default features only — do NOT add --all-features (it would enable backend's
        # `llvm` feature and require an LLVM install).
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: dependency-graph
        run: cargo xtask graph-check
      - name: corpus-lint
        # Structural lint of tests/corpus: .bet <-> .expected pairing + feature
        # coverage vs MANIFEST.toml. No program execution.
        run: cargo xtask corpus --check
      - name: corpus-run
        # Execute every `interp = "pass"` program via `bet run` and diff stdout against its
        # .expected (byte-exact). Gates the interpreter's pass set: fails if any `pass` program
        # regresses, or if an `unsupported` program starts passing (ratchet — promote it).
        run: cargo xtask corpus
      - name: cargo-deny
        run: cargo deny check

  # Build + test natively on all six OS/arch combos (no cross-compile needed).
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-24.04,     target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu }
          - { os: macos-13,         target: x86_64-apple-darwin }
          - { os: macos-14,         target: aarch64-apple-darwin }
          - { os: windows-2022,     target: x86_64-pc-windows-msvc }
          - { os: windows-11-arm,   target: aarch64-pc-windows-msvc }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: install pinned toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest
      - name: build
        run: cargo build --workspace --locked
      - name: test
        # --no-tests=pass so a mostly-empty skeleton doesn't fail the run.
        run: cargo nextest run --workspace --locked --no-tests=pass
