name: ci

on:
  # Path-filtered to CORE (the Rust compiler + its test goldens + build config) so the
  # expensive 5-way `test` matrix and the `lint` job don't fire on changes that can't affect
  # them: self-hosted bet source (selfhost/**, verified by selfhost.yml), game ports
  # (ports/**), the bet-source stdlib scaffolding (std/**), or docs. Every input the `lint`
  # job reads (crates, corpus, the Rust configs) is in this list, so gating the whole workflow
  # loses no lint coverage. Keep the pull_request and push lists in sync by hand — GitHub
  # Actions does not reliably support YAML anchors, so the two lists are duplicated on purpose.
  pull_request:
    paths:
      - "crates/**"
      - "tests/corpus/**"
      - "tests/mir/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".cargo/config.toml"
      - "clippy.toml"
      - "rustfmt.toml"
      - "graph-allowlist.toml"
      - "deny.toml"
      - ".gitattributes"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    # Duplicate of the pull_request paths above (no YAML anchors in GH Actions).
    paths:
      - "crates/**"
      - "tests/corpus/**"
      - "tests/mir/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".cargo/config.toml"
      - "clippy.toml"
      - "rustfmt.toml"
      - "graph-allowlist.toml"
      - "deny.toml"
      - ".gitattributes"
      - ".github/workflows/ci.yml"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: lint + test only build/test/lint the workspace — they never write to the
# repo, packages, or checks. Default the whole workflow to a read-only GITHUB_TOKEN (scope up
# per-job only if a future job genuinely needs more).
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # Host-independent checks run once (cheap): formatting, lints, dependency-graph, deny.
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: install pinned toolchain
        run: rustup show          # reads rust-toolchain.toml (channel + rustfmt + clippy)
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@c7eb1735f09259a5035e8e5d44b1406b1cddc0fb # v2.83.0
        with:
          tool: cargo-deny
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        # default features only — do NOT add --all-features (it would enable backend's
        # `llvm` feature and require an LLVM install).
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: dependency-graph
        run: cargo xtask graph-check
      - name: corpus-lint
        # Structural lint of tests/corpus: .bet <-> .expected pairing + feature
        # coverage vs MANIFEST.toml. No program execution.
        run: cargo xtask corpus --check
      - name: corpus-run
        # Execute every `interp = "pass"` program via `bet run` and diff stdout against its
        # .expected (byte-exact). Gates the interpreter's pass set: fails if any `pass` program
        # regresses, or if an `unsupported` program starts passing (ratchet — promote it).
        run: cargo xtask corpus
      - name: cargo-deny
        run: cargo deny check

  # Build + test natively on all five OS/arch combos (no cross-compile needed). The x86_64
  # macOS combo (macos-13 / x86_64-apple-darwin) was dropped because GitHub is retiring the
  # Intel macOS image; macos-14 (arm64) keeps Darwin coverage.
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-24.04,     target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu }
          - { os: macos-14,         target: aarch64-apple-darwin }
          - { os: windows-2022,     target: x86_64-pc-windows-msvc }
          - { os: windows-11-arm,   target: aarch64-pc-windows-msvc }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: install pinned toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}
      - uses: taiki-e/install-action@c7eb1735f09259a5035e8e5d44b1406b1cddc0fb # v2.83.0
        with:
          tool: nextest
      - name: build
        run: cargo build --workspace --locked
      - name: test
        # --no-tests=pass so a mostly-empty skeleton doesn't fail the run.
        run: cargo nextest run --workspace --locked --no-tests=pass
