name: backend-llvm

# Ready-but-not-wired: manual only. The default `ci.yml` never builds LLVM, so no PR runner
# needs it. This job builds `backend` with the `llvm` feature and runs the tracer-bullet
# tests — backend codegen (`.mir` → object) plus the driver end-to-end (`bet build` a program,
# run the binary, assert its stdout) — against the pinned LLVM. Linux-only for now; macOS and
# Windows LLVM CI are the tracked fast-follow (Milestone 2 on all three OSes).
on:
  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always
  # llvm-sys (180.x, for LLVM 18) locates the toolchain via this prefix; apt installs LLVM 18
  # to /usr/lib/llvm-18. Keep the LLVM major in sync with inkwell's `llvm18-0` feature and
  # `cargo xtask setup-llvm`.
  LLVM_SYS_180_PREFIX: /usr/lib/llvm-18

jobs:
  tracer-bullet:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: install LLVM 18 + C toolchain
        # libzstd-dev: LLVM 18's static libs link against zstd. clang/cc: the link driver the
        # backend shells out to for compiled programs.
        run: sudo apt-get update && sudo apt-get install -y llvm-18-dev libpolly-18-dev libzstd-dev clang
      - name: install pinned toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest
      - name: build backend with llvm
        run: cargo build -p backend --features llvm --locked
      - name: tracer-bullet tests (codegen + bet build -> run)
        run: cargo nextest run -p backend -p driver --features llvm --locked
