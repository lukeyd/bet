name: backend-llvm

# The default `ci.yml` never builds LLVM (keeps the 6-way matrix fast and LLVM-free). This
# job builds `backend --features llvm` and runs the tracer-bullet tests — backend codegen
# (`.mir` -> object) plus the driver end-to-end (`bet build` a program, run the binary,
# assert its stdout) — against the pinned LLVM 18 (spec milestone 2), on Linux and macOS.
#
# Step-3 gating: runs on pushes to main and on PRs that touch the codegen/link/runtime-ABI
# path (below), so backend and frontend-lowering regressions are caught without paying the
# LLVM build cost on unrelated/docs PRs. Still manually dispatchable for one-off checks.
#
# Windows LLVM CI is a tracked follow-up. `llvm-sys` 180 needs an LLVM 18 that ships
# `llvm-config` + the LLVM libraries, but the standard Windows distributions (Chocolatey and
# the official installer) are clang-toolchain-only -- the build fails with "No suitable
# version of LLVM was found". It needs a prebuilt-with-libraries LLVM or a from-source build.
# The driver's MSVC link path (crates/driver/src/link.rs) is already in place for when that
# lands; enabling Windows here is then just adding it back to the matrix with a working
# LLVM-18-with-libs install step.
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    # Keep this list in sync with the pull_request paths below (GitHub Actions does not
    # reliably support YAML anchors, so the two lists are duplicated on purpose).
    paths:
      - "crates/backend/**"
      - "crates/driver/**"
      - "crates/frontend/**"
      - "crates/midir/**"
      - "crates/rt-abi/**"
      - "crates/rt-stub/**"
      - "tests/mir/**"
      - "tests/corpus/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/backend-llvm.yml"
  pull_request:
    paths:
      - "crates/backend/**"
      - "crates/driver/**"
      - "crates/frontend/**"
      - "crates/midir/**"
      - "crates/rt-abi/**"
      - "crates/rt-stub/**"
      - "tests/mir/**"
      - "tests/corpus/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/backend-llvm.yml"

concurrency:
  group: backend-llvm-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  tracer-bullet:
    name: tracer-bullet (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # --- LLVM 18 (llvm-sys 180.x locates it via LLVM_SYS_180_PREFIX) ---
      - name: install LLVM 18 (Linux)
        if: runner.os == 'Linux'
        # libzstd-dev: LLVM 18's static libs link against zstd. clang: the link driver.
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-18-dev libpolly-18-dev libzstd-dev clang
          echo "LLVM_SYS_180_PREFIX=/usr/lib/llvm-18" >> "$GITHUB_ENV"

      - name: install LLVM 18 (macOS)
        if: runner.os == 'macOS'
        # LIBRARY_PATH so the linker finds Homebrew's zstd (LLVM's static libs need it).
        run: |
          brew install llvm@18
          PREFIX="$(brew --prefix llvm@18)"
          echo "LLVM_SYS_180_PREFIX=$PREFIX" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=$(brew --prefix)/lib" >> "$GITHUB_ENV"
          echo "$PREFIX/bin" >> "$GITHUB_PATH"

      - name: install pinned toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: build backend with llvm
        run: cargo build -p backend --features llvm --locked

      - name: tracer-bullet tests (codegen + bet build -> run)
        run: cargo nextest run -p backend -p driver --features llvm --locked

      # Compiled differential column: with codegen available (LLVM 18 is installed above),
      # `bet build` every `compiled = "pass"` corpus program, run it, and assert its stdout ==
      # .expected == the interpreter's stdout (the interp == compiled invariant). This gates the
      # compiled `pass` set. `--compiled` builds the driver `--features llvm` itself (inheriting
      # LLVM_SYS_180_PREFIX from the env above); if LLVM were absent it would skip cleanly and
      # pass, so this step only ever fails on a real codegen regression.
      - name: corpus compiled differential column
        run: cargo xtask corpus --compiled
