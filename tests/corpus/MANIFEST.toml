# --- 14 modules --------------------------------------------------------------
# `modules.bet` pulls the sibling `geometry.bet` (an aux helper) and reaches its `flex` exports
# through the `geometry` namespace — qualified calls, consts, types, and struct literals; its
# `hush` items stay private. Resolved by `frontend::load` into one program before lowering.
[[program]]
path = "14-modules/modules"
covers = ["modules.pull", "modules.qualified", "modules.visibility"]
interp = "pass"
compiled = "pass"

# --- 12 doom (the doom-port language package) ---------------------------------
# The whole doom GameState design in miniature: ONE module-level `flex crib gsc: GameState[1]`
# (in aux `12-doom/state`, with a second `mobjs` crib), copped zero-default, handle fields
# (slab/vec/stash/fn-value) assigned after the cop, and mutated cross-module — including from
# the subdirectory module `12-doom/sub/mod` via `pull "sub/mod" as m` — through qualified holla.
[[program]]
path = "12-doom/gamestate-crib"
covers = ["doom.gamestate", "memory.crib", "modules.pull", "modules.qualified"]
interp = "pass"
compiled = "pass"

# Per-slot evict (`evict tag in crib`): freed tag ghosts, others untouched, forced slot reuse
# at a bumped generation, stale double-evict no-op — against the aux `12-doom/arena` module's
# crib, both qualified (entry file) and unqualified (inside the module).
[[program]]
path = "12-doom/evict-slot"
covers = ["doom.evict-slot", "memory.generation-reuse"]
interp = "pass"
compiled = "pass"

# `fs.drop(path, data) -> bool`: write bytes, read them back with fs.peep, overwrite-truncate,
# and a failing destination reported as `cap`. The scratch file is repo-root-relative (the
# fs-peep convention) and gitignored.
[[program]]
path = "12-doom/fs-drop"
covers = ["doom.fs-drop", "stdlib.fs"]
interp = "pass"
compiled = "pass"

# Fn values as function parameters (the thinker-iteration callback pattern).
[[program]]
path = "12-doom/fn-param"
covers = ["doom.fn-param", "functions.first-class"]
interp = "pass"
compiled = "pass"

# Sized-int idioms (i8 sign-extension, u8/i16/u32 slab elements, i32<->i64<->u32 casts, `>>`
# on a negative i32). Every wrap goes through an EXPLICIT cast, which both paths honor — the
# 09-bit-math lesson: only implicit width-wrapping arithmetic diverges from the interpreter.
[[program]]
path = "12-doom/int-widths"
covers = ["doom.int-widths", "values.casts", "values.numeric-tower"]
interp = "pass"
compiled = "pass"

# The #72 regression guard: MANY `tag`/ref fields (four per node, N nodes) stored into a crib
# and save/restored at scale (serialize links -> evict -> re-cop -> restore), then folded to a
# checksum. Catches a mis-stored/mis-resolved tag (the 16-byte-Tag ABI class) as an interp !=
# compiled divergence — the coverage the native-only DOOM saveg smoke lacked in `corpus`.
[[program]]
path = "12-doom/tag-refs-scale"
covers = ["doom.tag-refs-scale"]
interp = "pass"
compiled = "pass"

# --- 15 simd (first-class fixed-width vector types) -------------------------
# `<N x T>` vectors that lower to LLVM vector types with single-instruction lane ops. Integer
# lanes are exact on both paths; float lanes are held in true `f32` by the interpreter so `vec4`
# math matches the compiled `<4 x float>` bit-for-bit. Both are interp == compiled at O0 and O2.
[[program]]
path = "15-simd/simd-int"
covers = ["simd.construct", "simd.arithmetic", "simd.lanes", "simd.minmax", "simd.reduce"]
interp = "pass"
compiled = "pass"

[[program]]
path = "15-simd/simd-float"
covers = ["simd.float", "simd.reduce"]
interp = "pass"
compiled = "pass"
