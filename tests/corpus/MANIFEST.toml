# Corpus manifest — maps each golden program to the language features it exercises.
#
# `cargo xtask corpus --check` reads this file and enforces:
#   1. every `[[program]].path` has both a `.bet` and a `.expected` on disk;
#   2. every `.bet`/`.expected` pair on disk is listed here (no orphans);
#   3. every key in `[features].all` is covered by >= 1 program (no coverage gaps);
#   4. every key in a program's `covers` exists in `[features].all` (no typos).
#
# The taxonomy tracks the spec + plan-amendment-01 §2 feature set. When a new feature
# lands, add its key here AND a program that covers it — the lint fails otherwise.

[features]
all = [
  # 01 basics
  "basics.print", "basics.format", "basics.comments",
  # 02 values
  "values.mutability", "values.constants", "values.inference", "values.numeric-tower",
  "values.casts", "values.arithmetic", "values.bool-logic", "values.strings",
  "values.array-literal",
  # 03 control flow
  "control.if", "control.while", "control.foreach", "control.break-continue",
  # 04 functions
  "functions.basic", "functions.multi-return", "functions.receivers",
  "functions.first-class", "functions.generics",
  # 05 structs
  "structs.drip", "structs.value-copy", "structs.visibility", "structs.generic",
  # 06 sum types
  "sumtypes.moods", "sumtypes.vibe-match", "sumtypes.exhaustiveness",
  # 07 errors
  "errors.yikes", "errors.tea", "errors.bounce", "errors.yeet-sheesh",
  # 08 memory model
  "memory.crib", "memory.cop-evict", "memory.tag", "memory.holla-ghosted",
  "memory.trust", "memory.scratch", "memory.generation-reuse",
  # 09 bit math
  "bits.operators", "bits.bam-angles", "bits.wrapping", "bits.fixed-point",
  # 10 stdlib
  "stdlib.stash", "stdlib.bytes", "stdlib.squadops",
  # 11 reference oracles
  "reference.compiler", "reference.doom",
]

# --- 01 basics --------------------------------------------------------------
[[program]]
path = "01-basics/hello"
covers = ["basics.print"]

[[program]]
path = "01-basics/spill-format"
covers = ["basics.format"]

[[program]]
path = "01-basics/comments"
covers = ["basics.comments"]

# --- 02 values --------------------------------------------------------------
[[program]]
path = "02-values/lowkey-facts"
covers = ["values.mutability", "values.constants", "values.inference"]

[[program]]
path = "02-values/numeric-tower"
covers = ["values.numeric-tower"]

[[program]]
path = "02-values/casts"
covers = ["values.casts"]

[[program]]
path = "02-values/arithmetic"
covers = ["values.arithmetic"]

[[program]]
path = "02-values/bool-logic"
covers = ["values.bool-logic"]

[[program]]
path = "02-values/strings"
covers = ["values.strings"]

# --- 03 control -------------------------------------------------------------
[[program]]
path = "03-control/fr-naw"
covers = ["control.if"]

[[program]]
path = "03-control/vibin"
covers = ["control.while"]

[[program]]
path = "03-control/squad"
covers = ["control.foreach", "values.array-literal"]

[[program]]
path = "03-control/nested-loops"
covers = ["control.break-continue"]

# --- 04 functions -----------------------------------------------------------
[[program]]
path = "04-functions/finna-basics"
covers = ["functions.basic"]

[[program]]
path = "04-functions/multi-return"
covers = ["functions.multi-return"]

[[program]]
path = "04-functions/receivers"
covers = ["functions.receivers"]

[[program]]
path = "04-functions/first-class-fn"
covers = ["functions.first-class"]

[[program]]
path = "04-functions/generics-fn"
covers = ["functions.generics"]

# --- 05 structs -------------------------------------------------------------
[[program]]
path = "05-structs/drip-basics"
covers = ["structs.drip", "structs.value-copy"]

[[program]]
path = "05-structs/visibility"
covers = ["structs.visibility", "functions.receivers"]

[[program]]
path = "05-structs/drip-generic"
covers = ["structs.generic"]

# --- 06 sum types -----------------------------------------------------------
[[program]]
path = "06-sumtypes/moods-basics"
covers = ["sumtypes.moods", "sumtypes.vibe-match"]

[[program]]
path = "06-sumtypes/moods-exhaustive"
covers = ["sumtypes.exhaustiveness"]

[[program]]
path = "06-sumtypes/expr-eval"
covers = ["sumtypes.moods", "sumtypes.vibe-match"]

# --- 07 errors --------------------------------------------------------------
[[program]]
path = "07-errors/yikes-basics"
covers = ["errors.yikes"]

[[program]]
path = "07-errors/tea-wrap"
covers = ["errors.tea"]

[[program]]
path = "07-errors/bounce"
covers = ["errors.bounce"]

[[program]]
path = "07-errors/yeet-sheesh"
covers = ["errors.yeet-sheesh"]

# --- 08 memory --------------------------------------------------------------
[[program]]
path = "08-memory/crib-cop-evict"
covers = ["memory.crib", "memory.cop-evict"]

[[program]]
path = "08-memory/typed-crib-tag"
covers = ["memory.tag"]

[[program]]
path = "08-memory/holla-ghosted"
covers = ["memory.holla-ghosted"]

[[program]]
path = "08-memory/trust"
