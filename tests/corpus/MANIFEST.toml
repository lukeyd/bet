# Corpus manifest — maps each golden program to the language features it exercises.
#
# `cargo xtask corpus --check` reads this file and enforces:
#   1. every `[[program]].path` has both a `.bet` and a `.expected` on disk;
#   2. every `.bet`/`.expected` pair on disk is listed here (no orphans);
#   3. every key in `[features].all` is covered by >= 1 program (no coverage gaps);
#   4. every key in a program's `covers` exists in `[features].all` (no typos).
#
# `cargo xtask corpus` (no `--check`) additionally EXECUTES each program through the
# interpreter (`bet run`) and diffs stdout against its `.expected`, gated by the per-program
# `interp` field:
#   * "pass"        — must run and match `.expected` byte-for-byte (the gated set).
#   * "unsupported" — must still error (non-zero `bet run`); a newly-passing one is flagged so
#                     coverage gains get ratcheted in. Reduce this set over time.
#   * "skip"        — not executed (parses, but out of the interpreter's scope for now).
# `interp` defaults to "pass" when omitted.
#
# `cargo xtask corpus --compiled` runs the OTHER half of the differential runner (needs an
# LLVM codegen driver; without one it skips cleanly and passes). For each program it consults
# the per-program `compiled` field:
#   * "pass" — `bet build` it to a native executable, run it, and assert its stdout equals
#              `.expected` byte-for-byte AND equals the interpreter's stdout for the same
#              program (the interp == compiled invariant). A failure is a hard error (ratchet).
#   * "skip" — not compiled/run (codegen out of scope for it for now).
# `compiled` defaults to "skip" when omitted. Today only the `spill.it("literal")` tracer-bullet
# programs are "pass"; the computed-value set is promoted as backend/runtime codegen grows.
#
# The taxonomy tracks the spec + plan-amendment-01 §2 feature set. When a new feature
# lands, add its key here AND a program that covers it — the lint fails otherwise.

[features]
all = [
  # 01 basics
  "basics.print", "basics.format", "basics.comments",
  # 02 values
  "values.mutability", "values.constants", "values.inference", "values.numeric-tower",
  "values.casts", "values.arithmetic", "values.bool-logic", "values.strings",
  "values.array-literal", "values.compound-assign",
  # 03 control flow
  "control.if", "control.while", "control.foreach", "control.break-continue",
  # 04 functions
  "functions.basic", "functions.multi-return", "functions.receivers",
  "functions.first-class", "functions.generics",
  # 05 structs
  "structs.drip", "structs.value-copy", "structs.visibility", "structs.generic",
  # 06 sum types
  "sumtypes.moods", "sumtypes.vibe-match", "sumtypes.exhaustiveness", "sumtypes.struct-payload",
  # 07 errors
  "errors.yikes", "errors.tea", "errors.bounce", "errors.yeet-sheesh",
  # 08 memory model
  "memory.crib", "memory.cop-evict", "memory.tag", "memory.holla-ghosted",
  "memory.trust", "memory.scratch", "memory.generation-reuse",
  # 09 bit math
  "bits.operators", "bits.bam-angles", "bits.wrapping", "bits.fixed-point",
  # 10 stdlib
  "stdlib.stash", "stdlib.bytes", "stdlib.squadops", "stdlib.vec", "stdlib.str",
  # 11 reference oracles
  "reference.compiler", "reference.doom",
  # 12 ffi
  "ffi.extern",
  # 13 concurrency
  "concurrency.slide",
]

