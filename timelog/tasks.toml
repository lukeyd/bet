# tasks.toml — work breakdown that drives velocity + ETA (see `cargo xtask timelog eta`).
#
# Each task's `slug` MUST match the --task passed to scripts/timelog.sh so logged
# time aggregates onto the right task. `size` is a RELATIVE estimate in points
# (Fibonacci-ish); absolute value doesn't matter, only ratios. `status` is one of
# todo | doing | done. Velocity = (points of done tasks) / (active hours on them);
# ETA = (remaining points) / velocity. Sizes are initial guesses — tune them as
# real velocity data accrues so the ETA sharpens.
#
# Seeded from bootstrap-plan.md §2/§6 and language-spec.md §11.4 + plan-amendment-01 §7.
# Remaining work restructured (2026-07-03) to match the approved "Open Doom's Gate" plan
# (~/.claude/plans/plan-all-remaining-mossy-kay.md). The four initial fan-out tasks
# (frontend/backend/runtime/interp) delivered their original core scope and are marked
# done; their *remaining* work is broken out into the granular tasks below so the ETA
# doesn't double-count. `doom` stays out of scope: it is the gate this plan stops at.

