status = "done"

[[task]]
slug = "selfhost-ast"
name = "C2: AST as moods+drip, tag-linked in cribs (mirror ast.rs; scale up mini-compiler.bet's shape)"
size = 3
# DONE, but as an INDEX-ARENA LABEL-TREE, not tag-linked cribs. Design driven by probing bet's
# actual semantics on BOTH paths (interp + compiled): (1) structs pass BY VALUE — scalar-field
# mutation via a method/free-fn does NOT propagate; (2) `v[i] = x` index-assignment does NOT lower
# on the compiled path; (3) vecs ARE shared handles (mutations via .stack/.pop propagate through a
# by-value struct across call levels). So all mutable parser state lives in shared-handle vecs. The
# AST node is `drip Node{ label: str, kids: vec[int] }` where label is the EXACT dump line — one
# node per dump line — held in a `vec[Node]` arena inside `drip P`; the cursor + no_struct flag are
# 1-element vec cells mutated via pop+stack. This makes --emit ast byte-identical BY CONSTRUCTION
# (emit = walk, print label at depth, recurse kids) and sidesteps generational-tag ceremony. C4
# (lower) can enrich node kinds if the tree-walk needs typed dispatch. Folds into selfhost-parser.
status = "done"

