# cargo-deny config (checked in CI: `cargo deny check`). Start permissive-but-audited;
# tighten as the tree stabilizes.

[advisories]
yanked = "deny"
# ignore = []   # add RUSTSEC ids here with a justification when unavoidable

[licenses]
# LLVM-exception covers the inkwell/llvm-sys stack (seeded in the workspace catalog).
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"   # tighten to "deny" once versions settle
wildcards = "deny"
# ...but internal workspace crates depend on each other by `path` with no version,
# which reads as a wildcard. That's intentional and safe, so allow it.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
